services:
  bot:
    build: .
    container_name: osint_bot
    ports:
      - "8080:8080"
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=llama3:latest
    volumes:
      - ./bot/data:/app/data
    depends_on:
      - ollama
    networks:
      - osint_network

  ollama:
    image: ollama/ollama:latest
    container_name: ollama_server
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - osint_network
    deploy:
      resources:
        limits:
          memory: 8G

networks:
  osint_network:
    driver: bridge

volumes:
  ollama_data: